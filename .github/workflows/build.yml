name: Build Marp Slides

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build slides (Marp, recursive)
        run: |
          mkdir -p dist/slides
          # Marp CLI --input-dir recurses naturally + preserves subfolder structure.
          # Replaces earlier per-file loop that ran into "multiple files + --output" CLI conflict.
          marp --input-dir slides --output dist/slides --html

      - name: Build takeaways (Marp, recursive)
        run: |
          mkdir -p dist/takeaways
          while IFS= read -r f; do
            rel="${f#takeaways/}"
            out="dist/takeaways/${rel%.md}.html"
            mkdir -p "$(dirname "$out")"
            # takeaways are plain MD (no Marp directives) — use pandoc for clean HTML
            pandoc "$f" --from=gfm --to=html5 --standalone \
              --metadata lang="zh-TW" \
              --variable=pagetitle="$(basename "$rel" .md) — Key Takeaways" \
              --css=/textbook-notes/index.css \
              --output="$out"
          done < <(find takeaways -name '*.md' -type f)

      - name: Build index page (pandoc, responsive HTML)
        run: |
          mkdir -p dist
          cp styles/index.css dist/index.css
          pandoc index.md \
            --from=gfm \
            --to=html5 \
            --standalone \
            --variable=pagetitle="Textbook Teaching Slides — copper" \
            --metadata lang="zh-TW" \
            --css=index.css \
            --output=dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
