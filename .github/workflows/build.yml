name: Build Marp Slides

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build slides (Marp)
        run: |
          mkdir -p dist/slides
          for f in slides/*.md; do
            basename=$(basename "$f" .md)
            marp "$f" --html --output "dist/slides/${basename}.html"
          done

      - name: Build index page (pandoc, responsive HTML)
        run: |
          mkdir -p dist
          cp styles/index.css dist/index.css
          pandoc index.md \
            --from=gfm \
            --to=html5 \
            --standalone \
            --variable=pagetitle="腎臟專科考試複習 — Teaching Slides" \
            --metadata lang="zh-TW" \
            --css=index.css \
            --output=dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
